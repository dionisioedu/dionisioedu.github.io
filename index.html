<!DOCTYPE html><html lang="en" class="astro-j7pv25f6"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dionisio Dev Hub</title><meta name="robots" content="noindex"><!-- If JS is disabled, redirect to English (change to pt if you prefer). --><noscript><meta http-equiv="refresh" content="0; url=en/"></noscript><script>
      (function () {
        try {
          const saved = localStorage.getItem('preferredLocale');
          if (saved === 'pt' || saved === 'en') {
            window.location.replace('/' + saved + '/');
            return;
          }
        } catch (e) {}

        const langs = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || 'en'];

        const wantsPT = langs.some(l => String(l).toLowerCase().startsWith('pt'));
        const locale = wantsPT ? 'pt' : 'en';

        // Compute base path for sites served from a subpath (GitHub Pages).
        let base = location.pathname.replace(/index\.html$/, '');
        if (!base.endsWith('/')) base = base + '/';
        window.location.replace(base + locale + '/');
      })();
    </script><style>html,body{height:100%}body{margin:0;background:transparent}
